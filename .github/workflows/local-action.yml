name: Test Local Action
on:
  push: {}
  pull_request: {}
  workflow_dispatch: {}

jobs:
  run-local-action:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [
          ubuntu-latest,
          macos-latest,
          windows-latest,
        ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Local Action
        uses: ./

      - name: Smoketest VM Binary Exists
        run: vm --version
