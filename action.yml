name: 'voidmerge Action'
description: 'GitHub Actions for voidmerge ⚡️ Setup voidmerge quickly and build your site fast.'
author: 'voidmerge'
inputs:
  voidmerge-version:
    description: 'The voidmerge version to download (if necessary) and use. Example: 0.3.5'
    required: false
    default: 'latest'
runs:
  using: 'node20'
  main: 'lib/index.js'
branding:
  icon: 'book-open'
  color: 'purple'
